<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Page Merger to Single Image</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #4285f4; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #80868b; margin-bottom: 20px; }
        .upload-zone {
            border: 2px dashed #4285f4;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            background: #202124;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .action-bar {
            background: #202124;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex; flex-direction: column; gap: 10px; align-items: center; justify-content: center;
        }
        button {
            padding: 12px 25px; font-size: 16px; border-radius: 6px; font-weight: bold;
            border: none; background-color: #34a853; color: white; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #2c8a46; }
        button:disabled { background-color: #3c4043; cursor: not-allowed; color: #80868b; }
        .status-msg { font-size: 14px; color: #f2994a; font-weight: bold; }
        .viewer-box {
            background: #202124;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-height: 500px;
            overflow-y: auto; /* Agar preview tidak kepanjangan di layar laptop */
            border: 1px solid #3c4043;
        }
        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            background: #fff;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Comic Page Merger</h1>
    <p class="subtitle">Gabungkan semua halaman komik jadi 1 gambar panjang untuk Google Translate</p>
    
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <p>Klik di sini untuk membuka file <b>PDF / CBZ Komik</b></p>
        <input type="file" id="fileInput" accept=".pdf, .cbz" style="display:none">
        <div id="fileName" style="color: #4285f4; font-weight: bold; margin-top: 5px;"></div>
    </div>

    <div class="action-bar">
        <div id="statusMsg" class="status-msg">Silahkan masukkan file komik dahulu...</div>
        <button id="mergeDownloadBtn" disabled>⚡ Gabungkan & Unduh Semua Halaman (.PNG)</button>
    </div>

    <div class="viewer-box">
        <p style="color: #80868b; margin-bottom: 10px;">Pratinjau Hasil Gabungan Canvas:</p>
        <canvas id="mergedCanvas"></canvas>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const fileInput = document.getElementById('fileInput');
    const mergedCanvas = document.getElementById('mergedCanvas');
    const mCtx = mergedCanvas.getContext('2d');
    
    const mergeDownloadBtn = document.getElementById('mergeDownloadBtn');
    const statusMsg = document.getElementById('statusMsg');

    let pdfDoc = null;
    let cbzImages = [];
    let loadedImagesArray = [];

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('fileName').textContent = file.name;
        statusMsg.textContent = "Sedang membaca file komik...";
        mergeDownloadBtn.disabled = true;
        
        // Reset data lama
        pdfDoc = null; cbzImages = []; loadedImagesArray = [];
        mCtx.clearRect(0, 0, mergedCanvas.width, mergedCanvas.height);

        const fileExtension = file.name.split('.').pop().toLowerCase();

        if (fileExtension === "pdf") {
            const fileReader = new FileReader();
            fileReader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
                    statusMsg.textContent = `File PDF terbaca: total ${pdfDoc.numPages} halaman. Memproses penggabungan...`;
                    processPdfMerger();
                } catch (err) { statusMsg.textContent = "Gagal memuat PDF."; }
            };
            fileReader.readAsArrayBuffer(file);
        } else if (fileExtension === "cbz" || fileExtension === "zip") {
            const fileReader = new FileReader();
            fileReader.onload = async function(event) {
                try {
                    const zip = await JSZip.loadAsync(event.target.result);
                    const imagePromises = [];
                    zip.forEach((relativePath, zipEntry) => {
                        if (!zipEntry.dir && /\.(png|jpg|jpeg|gif|webp)$/i.test(zipEntry.name)) {
                            imagePromises.push(zipEntry.async("base64").then(base64 => {
                                return { name: zipEntry.name, data: "data:image/png;base64," + base64 };
                            }));
                        }
                    });
                    const resolvedImages = await Promise.all(imagePromises);
                    cbzImages = resolvedImages.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true})).map(img => img.data);
                    statusMsg.textContent = `File CBZ terbaca: total ${cbzImages.length} halaman. Memproses penggabungan...`;
                    processCbzMerger();
                } catch (err) { statusMsg.textContent = "Gagal memuat CBZ."; }
            };
            fileReader.readAsArrayBuffer(file);
        }
    });

    // PROSES GABUNGKAN CBZ KOMIK
    async function processCbzMerger() {
        const loadImgPromises = cbzImages.map(src => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = src;
            });
        });

        loadedImagesArray = await Promise.all(loadImgPromises);
        drawMergedImages();
    }

    // PROSES GABUNGKAN PDF KOMIK
    async function processPdfMerger() {
        for (let i = 1; i <= pdfDoc.numPages; i++) {
            const page = await pdfDoc.getPage(i);
            const viewport = page.getViewport({ scale: 1.5 }); // Set skala tajam
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = viewport.width;
            tempCanvas.height = viewport.height;
            await page.render({ canvasContext: tempCanvas.getContext('2d'), viewport: viewport }).promise;

            const img = new Image();
            await new Promise((resolve) => {
                img.onload = () => {
                    loadedImagesArray.push(img);
                    resolve();
                };
                img.src = tempCanvas.toDataURL("image/png");
            });
        }
        drawMergedImages();
    }

    // Fungsi menggambar semua halaman bertumpuk ke bawah
    function drawMergedImages() {
        if (loadedImagesArray.length === 0) return;

        // 1. Hitung dimensi canvas raksasa
        let totalHeight = 0;
        let maxWidth = 0;

        loadedImagesArray.forEach(img => {
            totalHeight += img.height;
            if (img.width > maxWidth) maxWidth = img.width;
        });

        // 2. Set ukuran canvas gabungan
        mergedCanvas.width = maxWidth;
        mergedCanvas.height = totalHeight;

        // 3. Gambar satu per satu dari atas ke bawah
        let currentY = 0;
        loadedImagesArray.forEach(img => {
            // Jika ada halaman yang lebih ramping, posisikan di tengah center
            let offsetX = (maxWidth - img.width) / 2;
            mCtx.drawImage(img, offsetX, currentY);
            currentY += img.height;
        });

        statusMsg.style.color = "#34a853";
        statusMsg.textContent = `Sukses menggabungkan ${loadedImagesArray.length} halaman menjadi 1 gambar panjang!`;
        mergeDownloadBtn.disabled = false;
    }

    // Download Handler
    mergeDownloadBtn.addEventListener('click', () => {
        statusMsg.style.color = "#4285f4";
        statusMsg.textContent = "Sedang mengekspor file gambar raksasa, mohon tunggu sebentar...";
        
        setTimeout(() => {
            const imageURL = mergedCanvas.toDataURL("image/png");
            const downloadLink = document.createElement('a');
            downloadLink.href = imageURL;
            downloadLink.download = `Komik_Full_Merged.png`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            
            statusMsg.style.color = "#34a853";
            statusMsg.textContent = "File gambar panjang berhasil diunduh!";
        }, 50);
    });
</script>

</body>
</html>
